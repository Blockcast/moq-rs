name: pr

on:
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  # ARC runners: image-baked toolchain lives on an overlay lower layer; rustup's
  # component rename hits EXDEV (os error 18). Keep rustup state on the writable work volume.
  RUSTUP_HOME: /home/runner/work/_rustup

jobs:
  reuse:
    runs-on: default
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v5

  build:
    runs-on: default

    steps:
      - uses: actions/checkout@v3

      # Install Rust with clippy/rustfmt
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      # Make sure u guys don't write bad code
      - run: cargo test --verbose
      - run: cargo clippy --no-deps
      - run: cargo fmt --check

      # Check for unused dependencies. bnjbvr/cargo-machete@main installs its
      # prebuilt binary to /usr/local/bin, which is read-only on the ARC
      # runner image — install into the writable CARGO_HOME instead.
      - run: cargo install cargo-machete --locked
      - run: cargo machete

  heap-profile-image:
    runs-on: default

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test -p moq-transport
      - run: cargo test -p moq-pub-mmtp --features heap-profiling heap_profile_and_allocator_totals_are_non_empty
        env:
          _RJEM_MALLOC_CONF: prof:true,prof_active:false,lg_prof_sample:0
      - run: >-
          docker build --file Dockerfile
          --build-arg HEAP_PROFILING=1
          --build-arg SOURCE_REVISION=${{ github.sha }}
          --build-arg BASE_REVISION=ec22a944e656163ef41fcd6de77199f28a34f15c
          --build-arg PROFILE_KIND=heap
          --tag moq-pub-mmtp:heap-profile-${{ github.sha }} .
